version: '3.8'

services:
  # 위협 정보 공유용 Redis DB
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # 파이썬으로 직접 만들 로드밸런서 1번
  lb1:
    build: ./load_balancer
    ports:
      - "8081:80"
    depends_on:
      - redis

  # 파이썬으로 직접 만들 로드밸런서 2번
  lb2:
    build: ./load_balancer
    ports:
      - "8082:80"
    depends_on:
      - redis

  # --- (기존 redis, lb1, lb2 등등 아래에 추가) ---
  web1:
    image: python:3.9-alpine
    command: sh -c "echo 'Hello! I am Backend Server [WEB-1] 🟢' > index.html && python -m http.server 80"

  web2:
    image: python:3.9-alpine
    command: sh -c "echo 'Hello! I am Backend Server [WEB-2] 🔵' > index.html && python -m http.server 80"
